<?xml version="1.0" encoding="UTF-8"?>
<!--
  FF Eberstalzell · Marken-Logo (SVG-Fallback)
  Wird automatisch geladen wenn /ff-eberstalzell-logo.png nicht existiert.
  Annäherung an das offizielle Logo: links Ortswappen + FF-Wappen, rechts
  vertikaler Roter Balken + Schriftblock "FREIWILLIGE FEUERWEHR EBERSTALZELL".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" role="img" aria-label="FF Eberstalzell">
  <!-- Ortswappen: gelbes Schild mit Eber -->
  <g transform="translate(4 6)">
    <path d="M0 0 H38 V52 L19 70 L0 52 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5"/>
    <path d="M3 3 H35 V50 L19 65 L3 50 Z" fill="#F4D6B5"/>
    <!-- stilisierter Eber -->
    <g fill="#1A1A1A">
      <ellipse cx="19" cy="34" rx="11" ry="6"/>
      <ellipse cx="11" cy="32" rx="4" ry="4"/>
      <path d="M9 33 L6 30 L7 35 Z"/>
      <rect x="14" y="40" width="2" height="4"/>
      <rect x="20" y="40" width="2" height="4"/>
      <path d="M30 30 L31 26 L28 27 Z"/>
    </g>
  </g>

  <!-- Feuerwehr-Wappen: rotes Schild mit Helm + gekreuzten Beilen -->
  <g transform="translate(48 6)">
    <path d="M0 0 H38 V52 L19 70 L0 52 Z" fill="#C8102E" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Helm -->
    <path d="M12 26 Q19 18 26 26 L26 30 H12 Z" fill="#F4D6B5" stroke="#1A1A1A" stroke-width="0.8"/>
    <rect x="13" y="29" width="12" height="2" fill="#1A1A1A"/>
    <!-- gekreuzte Beile -->
    <g stroke="#FFD700" stroke-width="2" fill="#FFD700" stroke-linecap="round">
      <line x1="8" y1="32" x2="30" y2="56"/>
      <line x1="30" y1="32" x2="8" y2="56"/>
    </g>
    <path d="M6 30 L10 28 L12 32 L8 34 Z" fill="#FFD700" stroke="#1A1A1A" stroke-width="0.5"/>
    <path d="M32 30 L28 28 L26 32 L30 34 Z" fill="#FFD700" stroke="#1A1A1A" stroke-width="0.5"/>
  </g>

  <!-- vertikaler roter Trenn-Balken -->
  <rect x="94" y="4" width="4" height="92" fill="#C8102E"/>

  <!-- Schriftblock -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="800">
    <text x="106" y="28" font-size="14" fill="#6B7280" letter-spacing="0.5">FREIWILLIGE</text>
    <text x="106" y="60" font-size="34" fill="#C8102E" letter-spacing="0.5">FEUERWEHR</text>
    <text x="106" y="88" font-size="22" fill="#1A1A1A" letter-spacing="0.5">EBERSTALZELL</text>
  </g>
</svg>
