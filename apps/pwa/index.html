<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#dc2626" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>HotDoc · FF Eberstalzell</title>
    <script>
      // Pre-paint theme to avoid color flash
      (function () {
        try {
          var k = "hotdoc.themeOverride";
          var o = localStorage.getItem(k);
          var h = new Date().getHours();
          document.documentElement.dataset.theme = o || (h >= 7 && h < 19 ? "light" : "dark");
        } catch (e) {
          /* noop */
        }
      })();
      // Pre-paint FX-Mode auto-detection — backdrop-filter blur(40px) ist auf
      // älteren Tablet-GPUs (z. B. Lenovo TB-X606X mit PowerVR GE8320) teuer.
      // Wir prüfen RAM + Cores + UA und setzen data-fx="lite" für schwache Geräte.
      // User-Override via localStorage gewinnt immer.
      (function () {
        try {
          var override = localStorage.getItem("hotdoc.fxMode");
          if (override === "lite" || override === "full") {
            document.documentElement.dataset.fx = override;
            return;
          }
          var mem = navigator.deviceMemory || 4;
          var cores = navigator.hardwareConcurrency || 4;
          var ua = navigator.userAgent || "";
          // Heuristik: ≤ 4 GB RAM ODER ≤ 4 Kerne ODER bekannte Schwach-Tablets
          // (Lenovo TB-X606X identifiziert sich oft mit "Lenovo TB-X" prefix)
          var lite =
            mem <= 4 ||
            cores <= 4 ||
            /Lenovo TB-X|Android [4-9]\.|MediaTek MT|Helio P22|GoTab|Galaxy Tab A/i.test(ua);
          document.documentElement.dataset.fx = lite ? "lite" : "full";
        } catch (e) {
          document.documentElement.dataset.fx = "full";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
