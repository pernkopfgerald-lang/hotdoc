# ───────────────────────────────────────────────────────────────
# HotDoc · API (Backend)
# Setup:
#   fly apps create hotdoc-api --org personal
#   fly secrets set -a hotdoc-api JWT_SECRET=...
#   fly deploy -c deploy/api/fly.toml --dockerfile deploy/api/Dockerfile
# ───────────────────────────────────────────────────────────────

app             = "hotdoc-api"
primary_region  = "fra"
kill_signal     = "SIGTERM"
kill_timeout    = 10

[build]
  # Pfad relativ zum fly.toml-Verzeichnis (= Repo-Root).
  dockerfile = "deploy/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3000"
  # Issue 3 (Einsatz-Test 2026-06-02): Container-Zeitzone auf Europe/Vienna
  # damit Logs + Default-Date-Format konsistent mit den FF-Zeiten sind.
  # Die PDF-Renderer + Frontend-Stellen setzen `timeZone` explizit fuer
  # `toLocaleString` — diese ENV-Variable ist die zweite Verteidigungs-Linie.
  TZ        = "Europe/Vienna"
  COUCH_URL = "http://hotdoc-db.internal:5984"
  COUCH_DB  = "hotdoc"
  AUDIO_RETENTION_DAYS = "30"
  # PIN-loser Setup-Modus — Tablets registrieren sich nur über fahrzeugId.
  # Auf "0" oder leer setzen + redeploy = PIN-Pflicht wieder aktiv.
  # Voraussetzung für Open-Mode: Tablets stehen im Tailscale-Netz oder
  # im LAN des FF-Hauses (siehe docs/TAILSCALE-SETUP.md).
  HOTDOC_TABLET_NO_PIN = "1"
  # ────────────────────────────────────────────────────────────────────
  # TODO: PRODUKTIV-SCHUTZ — siehe docs/PRODUCTION-SECRETS.md
  # ────────────────────────────────────────────────────────────────────
  # Folgende Werte MÜSSEN vor Produktiv-Schaltung als `fly secrets`
  # gesetzt werden und aus dieser Datei entfernt:
  #   - JWT_SECRET                  (rotieren — aktueller Wert ist in Git-History)
  #   - COUCH_USER / COUCH_PASS     (in Secrets verschieben, aktueller Wert behalten)
  #   - BOOTSTRAP_ADMIN_USERNAME / _PASSWORD  (in Secrets verschieben oder löschen)
  #
  # Anleitung:
  #     fly secrets set JWT_SECRET="$(python -c 'import secrets;print(secrets.token_hex(48))')" -a hotdoc-api --stage
  #     fly secrets set COUCH_USER=admin -a hotdoc-api --stage
  #     fly secrets set COUCH_PASS=<aktueller Wert> -a hotdoc-api --stage
  #     fly secrets deploy -a hotdoc-api
  #     # → dann diese vier Zeilen unten ENTFERNEN + committen
  # ────────────────────────────────────────────────────────────────────
  COUCH_USER = "admin"
  COUCH_PASS = "hotdoc-dev-changeme-now"
  JWT_SECRET = "hotdoc-dev-jwt-secret-bitte-rotieren-mit-fly-secrets-mindestens-32-zeichen"
  BOOTSTRAP_ADMIN_USERNAME = "admin"
  BOOTSTRAP_ADMIN_PASSWORD = "admin12345678"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "1gb"
