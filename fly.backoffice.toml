# ───────────────────────────────────────────────────────────────
# HotDoc · Backoffice
# Setup:
#   fly apps create hotdoc-backoffice --org personal
#   fly deploy -c deploy/backoffice/fly.toml --dockerfile deploy/backoffice/Dockerfile
# ───────────────────────────────────────────────────────────────

app             = "hotdoc-backoffice"
primary_region  = "fra"

[build]
  dockerfile = "deploy/backoffice/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"
